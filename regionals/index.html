<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NCAA D1 Softball — Regionals</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --sf:#1a1d24; --sf2:#22262f; --sf3:#2a2e38;
  --bd:#2e3340; --ac:#c8a951; --ac2:#7c5cbf;
  --tx:#e8eaf0; --mu:#8a8fa0; --rd:#e05555; --gn:#4caf76;
  --wb:#9A4B8F; --lb:#7A9B9E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Open Sans',sans-serif;font-size:13px;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--sf);border-bottom:2px solid var(--ac);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;flex-direction:column;gap:2px}
.hdr-title{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase}
.hdr-sub{font-size:11px;color:var(--mu);font-family:'Open Sans',sans-serif}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mbtn{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;padding:6px 15px;border-radius:8px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;letter-spacing:.8px;text-transform:uppercase;transition:all .15s}
.mbtn:hover{border-color:var(--ac);color:var(--ac)}
.mbtn.active{background:var(--ac);color:#111;border-color:var(--ac)}
.mbtn-reset{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;letter-spacing:.8px;text-transform:uppercase;transition:all .15s}
.mbtn-reset:hover{border-color:var(--rd);color:var(--rd)}
.acc-badge{font-family:'Montserrat',sans-serif;font-size:13px;color:var(--tx);background:var(--sf2);padding:5px 13px;border-radius:8px;border:1px solid var(--bd);white-space:nowrap}
.acc-badge span{color:var(--ac);font-weight:700}
.sync-wrap{display:flex;align-items:center;gap:6px;background:var(--sf2);padding:5px 10px;border-radius:8px;border:1px solid var(--bd);font-family:'Open Sans',sans-serif;font-size:11px;color:var(--mu);white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--mu);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#4caf76;box-shadow:0 0 5px rgba(76,175,118,.5)}
.sync-dot.syncing{background:var(--ac);animation:sdpulse .7s ease-in-out infinite}
.sync-dot.err{background:var(--rd)}
@keyframes sdpulse{0%,100%{opacity:1}50%{opacity:.2}}
.sync-btn{background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:0 1px;line-height:1;transition:color .15s}
.sync-btn:hover{color:var(--ac)}
.sync-new{color:var(--gn);font-weight:600}

/* ── MAIN ── */
.main{padding:20px 24px;max-width:1380px;margin:0 auto}
.pods-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}

/* ── POD ── */
.pod{background:var(--sf);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.pod-hdr{background:var(--sf2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.pod-name{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--tx);letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.pod-champ{font-family:'Oswald',sans-serif;font-size:11px;color:var(--ac);display:inline-flex;align-items:center;gap:3px}
.pod-champ::before{content:'🏆';font-size:10px}
.pod-date{font-size:10px;color:var(--mu);font-family:'Open Sans',sans-serif}
.pod-body{position:relative;height:258px;overflow:visible}
.pod-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ── GAME CARDS ── */
.gc{position:absolute;width:147px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;z-index:2}
.gc-lbl{font-family:'Oswald',sans-serif;font-size:9px;font-weight:600;padding:2px 7px;background:var(--sf3);border-bottom:1px solid var(--bd);letter-spacing:.6px;display:flex;justify-content:space-between;color:var(--mu);text-transform:uppercase}
.gc-lbl .wb{color:var(--wb)} .gc-lbl .lb{color:var(--lb)} .gc-lbl .champ{color:var(--ac)} .gc-lbl .ifnec{color:var(--mu);font-style:italic;text-transform:none}
.gc-team{display:flex;align-items:center;padding:2px 6px;height:26px;cursor:pointer;gap:4px;transition:background .1s}
.gc-team+.gc-team{border-top:1px solid var(--bd)}
.gc-team:hover:not(.tbd):not(.disabled){background:rgba(200,169,81,.13)}
.gc-team.picked{background:rgba(200,169,81,.1);border-left:2.5px solid var(--ac)}
.gc-team.winner{background:rgba(76,175,118,.09)}
.gc-team.loser{opacity:.38}
.gc-team.tbd,.gc-team.disabled{cursor:default}
.gc-logo{width:16px;height:16px;object-fit:contain;flex-shrink:0;border-radius:2px}
.gc-seed{font-family:'Oswald',sans-serif;font-size:9px;color:var(--mu);width:10px;text-align:center;flex-shrink:0}
.gc-name{font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-team.tbd .gc-name{color:var(--mu);font-style:italic}
.gc-score{font-family:'Oswald',sans-serif;font-size:11px;color:var(--ac);width:14px;text-align:center;flex-shrink:0;font-weight:600}
.gc-run{display:none;width:27px;background:var(--sf3);border:1px solid var(--bd);color:var(--ac);font-family:'Oswald',sans-serif;font-size:11px;text-align:center;padding:1px 2px;border-radius:6px;flex-shrink:0}
.gc-run:focus{outline:1px solid var(--ac)}
body.mode-locked .gc-run,body.mode-results .gc-run{display:block}
.gc-inn{display:none;padding:2px 7px;border-top:1px solid var(--bd);align-items:center;gap:4px}
.gc-inn label{font-size:9px;color:var(--mu);font-family:'Oswald',sans-serif}
.gc-inn input{width:28px;background:var(--sf3);border:1px solid var(--bd);color:var(--ac);font-family:'Oswald',sans-serif;font-size:9px;text-align:center;padding:1px 2px;border-radius:6px}
body.mode-locked .gc-inn,body.mode-results .gc-inn{display:flex}
.gc-champ-flag{display:inline-block;background:var(--ac);color:#111;font-family:'Oswald',sans-serif;font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;margin-left:3px;vertical-align:middle}
.gc-time{font-family:'Open Sans',sans-serif;font-size:7.5px;color:var(--mu);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:105px;letter-spacing:0;font-weight:400;text-transform:none}

/* SVG connectors */
.conn-wb{stroke:var(--wb);stroke-width:2;fill:none;opacity:.7}
.conn-lb{stroke:var(--lb);stroke-width:2;fill:none;opacity:.6;stroke-dasharray:5,3}
.conn-champ{stroke:var(--ac);stroke-width:2;fill:none;opacity:.48}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:22px 24px;min-width:320px;max-width:420px;position:relative}
.modal h2{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:var(--ac);margin-bottom:2px;text-transform:uppercase;letter-spacing:.8px}
.modal-sub{font-size:11px;color:var(--mu);margin-bottom:14px;font-family:'Open Sans',sans-serif}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--tx)}
.modal-games{list-style:none}
.modal-games li{padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;display:flex;justify-content:space-between;align-items:center;font-family:'Open Sans',sans-serif}
.modal-games li:last-child{border-bottom:none}
.wl-W{color:var(--gn);font-weight:700;font-family:'Oswald',sans-serif}
.wl-L{color:var(--rd);font-family:'Oswald',sans-serif}
.modal-rec{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-align:center;margin-top:12px;color:var(--tx)}
.modal-rec span{font-size:12px;color:var(--mu);display:block;margin-top:2px;font-family:'Open Sans',sans-serif}

/* Responsive */
@media(max-width:960px){.pods-grid{grid-template-columns:1fr}}
</style>
</head>

  collegestation: { g1:'5/15 · 2:00 PM · ESPN2', g2:'5/15 · 4:30 PM · ESPN+', g3:'5/16 · 3:00 PM', g4:'5/16 · 5:30 PM', g5:'5/16 · 8:00 PM', g6:'5/17 · 3:00 PM',  g7:'5/17 · 5:30 PM' },
  austin:         { g1:'5/15 · 4:00 PM · ESPN+', g2:'5/15 · 1:30 PM · ESPN+', g3:'5/16 · 1:00 PM', g4:'5/16 · 3:30 PM', g5:'5/16 · 6:00 PM', g6:'5/17 · 1:00 PM',  g7:'5/17 · 3:30 PM' },
};

function logoUrl(k) {
  const id = ESPN_IDS[k];
  return id ? `https://a.espncdn.com/i/teamlogos/ncaa/500/${id}.png` : null;
}

// Build TEAMS lookup
const TEAMS = {};
REGIONALS.forEach(reg => {
  reg.seeds.forEach((s,i) => {
    TEAMS[s.k] = { name:s.n, record:s.r, seed:i+1, regional:reg.key };
  });
});

// ─── FEEDS ──────────────────────────────────────────────────────────────────
const FEEDS = {
  g1: { winner:['g3',0], loser:['g4',0] },
  g2: { winner:['g3',1], loser:['g4',1] },
  g3: { winner:['g6',0], loser:['g5',0] },
  g4: { winner:['g5',1], loser:null },
  g5: { winner:['g6',1], loser:null },
  g6: { winner:'CHAMP_OR_G7', loser:null }, // special — handled in propagate + clearDownstream
  g7: { winner:'CHAMP', loser:null },
};

// ─── STATE ──────────────────────────────────────────────────────────────────
const STATE = {};
function initState(rKey) {
  const reg = REGIONALS.find(r=>r.key===rKey);
  const s = reg.seeds;
  STATE[rKey] = {
    g1:{ t0:s[0].k, t1:s[3].k, pick:null, score:[null,null], innings:null },
    g2:{ t0:s[1].k, t1:s[2].k, pick:null, score:[null,null], innings:null },
    g3:{ t0:null, t1:null, pick:null, score:[null,null], innings:null },
    g4:{ t0:null, t1:null, pick:null, score:[null,null], innings:null },
    g5:{ t0:null, t1:null, pick:null, score:[null,null], innings:null },
    g6:{ t0:null, t1:null, pick:null, score:[null,null], innings:null },
    g7:{ t0:null, t1:null, pick:null, score:[null,null], innings:null, active:false },
    champ: null,
  };
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getWinner(rKey, gk) {
  const g = STATE[rKey][gk];
  if (!g || (!g.t0 && !g.t1)) return null;
  if (isScoreWinner(rKey, gk)) {
    return g.score[0] > g.score[1] ? g.t0 : g.t1;
  }
  return g.pick;
}
function getLoser(rKey, gk) {
  const w = getWinner(rKey, gk);
  if (!w) return null;
  const g = STATE[rKey][gk];
  return w === g.t0 ? g.t1 : g.t0;
}
function isScoreWinner(rKey, gk) {
  const g = STATE[rKey][gk];
  return !!(g && g.score[0] !== null && g.score[1] !== null && g.score[0] !== g.score[1]);
}

// ─── CLEAR DOWNSTREAM ───────────────────────────────────────────────────────
function clearDownstream(rKey, gk) {
  const feed = FEEDS[gk];
  if (!feed) return;

  // Special: g6 directly sets g7 and champ outside FEEDS
  if (gk === 'g6') {
    const g7 = STATE[rKey].g7;
    g7.t0=null; g7.t1=null; g7.pick=null; g7.score=[null,null]; g7.innings=null; g7.active=false;
    STATE[rKey].champ = null;
    renderGame(rKey, 'g7');
    updatePodChamp(rKey);
  }
  if (gk === 'g7') {
    STATE[rKey].champ = null;
    updatePodChamp(rKey);
  }

  function clearFed(toGk, toSlot) {
    if (!toGk || !Array.isArray([toGk, toSlot])) return;
    const g = STATE[rKey][toGk];
    if (!g) return;
    const tKey = toSlot === 0 ? 't0' : 't1';
    if (!g[tKey]) return;
    g[tKey] = null;
    g.pick = null;
    g.score = [null, null];
    g.innings = null;
    if (toGk === 'g7') g.active = false;
    clearDownstream(rKey, toGk);
    renderGame(rKey, toGk);
  }
  if (Array.isArray(feed.winner)) clearFed(...feed.winner);
  if (feed.loser && Array.isArray(feed.loser)) clearFed(...feed.loser);
}

// ─── FEED TEAM ───────────────────────────────────────────────────────────────
function feedTeam(rKey, toGk, slot, team) {
  if (!team || !toGk) return;
  const g = STATE[rKey][toGk];
  const tKey = slot === 0 ? 't0' : 't1';
  const prev = g[tKey];
  if (prev && prev !== team) {
    clearDownstream(rKey, toGk);
    if (g.pick && g.pick !== g.t0 && g.pick !== g.t1 && g.pick !== team) {
      g.pick = null; g.score = [null,null]; g.innings = null;
    }
  }
  g[tKey] = team;
  const w = getWinner(rKey, toGk);
  if (w) propagate(rKey, toGk);
  renderGame(rKey, toGk);
}

// ─── PROPAGATE ───────────────────────────────────────────────────────────────
function propagate(rKey, gk) {
  const winner = getWinner(rKey, gk);
  const loser = getLoser(rKey, gk);
  if (!winner) return;
  const feed = FEEDS[gk];
  if (!feed) return;

  if (gk === 'g6') {
    if (isScoreWinner(rKey, 'g6')) {
      const g6 = STATE[rKey].g6;
      if (winner === g6.t0) {
        // WB team wins — champion, no G7
        STATE[rKey].champ = winner;
        STATE[rKey].g7.active = false;
        STATE[rKey].g7.t0 = null; STATE[rKey].g7.t1 = null;
        renderGame(rKey, 'g7');
      } else {
        // LB team wins — trigger if-necessary G7
        STATE[rKey].g7.active = true;
        STATE[rKey].g7.t0 = winner;  // LB winner
        STATE[rKey].g7.t1 = loser;   // WB team (1 loss now)
        renderGame(rKey, 'g7');
      }
    } else {
      // Pick only — G7 only possible if the LB team (t1) beats the WB team (t0)
      const g6 = STATE[rKey].g6;
      if (winner === g6.t1) {
        // LB pick wins G6 → If Nec could occur, preview teams
        STATE[rKey].g7.t0 = winner;
        STATE[rKey].g7.t1 = loser;
        STATE[rKey].champ = null;
      } else {
        // WB pick wins G6 → no G7 possible, they are champ
        STATE[rKey].g7.t0 = null;
        STATE[rKey].g7.t1 = null;
        STATE[rKey].champ = winner;
      }
      renderGame(rKey, 'g7');
    }
    updatePodChamp(rKey);
    return;
  }
  if (gk === 'g7') {
    STATE[rKey].champ = winner;
    updatePodChamp(rKey);
    return;
  }
  if (Array.isArray(feed.winner)) feedTeam(rKey, feed.winner[0], feed.winner[1], winner);
  if (feed.loser && Array.isArray(feed.loser) && loser) feedTeam(rKey, feed.loser[0], feed.loser[1], loser);
}

// ─── POD CHAMP BADGE ─────────────────────────────────────────────────────────
function updatePodChamp(rKey) {
  const el = document.getElementById(`pod-champ-${rKey}`);
  if (!el) return;
  const champ = STATE[rKey].champ;
  if (champ && TEAMS[champ]) {
    el.style.display='inline-flex'; el.textContent=TEAMS[champ].name;
  } else {
    el.style.display='none';
  }
}

// ─── PICK ────────────────────────────────────────────────────────────────────
function pickTeam(rKey, gk, tSlot) {
  const g = STATE[rKey][gk];
  if (!g) return;
  const team = tSlot === 0 ? g.t0 : g.t1;
  if (!team) return;
  const mode = document.body.className.replace('mode-','');
  if (mode === 'results') return;
  if (isScoreWinner(rKey, gk)) return;

  if (g.pick === team) {
    // Un-pick: clear this game's downstream
    g.pick = null;
    clearDownstream(rKey, gk);
  } else {
    const oldPick = g.pick;
    if (oldPick && oldPick !== team) clearDownstream(rKey, gk);
    g.pick = team;
    propagate(rKey, gk);
  }
  renderGame(rKey, gk);
  updateAccuracy();
  saveState();
}

// ─── SCORE INPUT ─────────────────────────────────────────────────────────────
function scoreInput(el, rKey, gk, tSlot) {
  const g = STATE[rKey][gk];
  const num = el.value.trim() === '' ? null : parseInt(el.value, 10);
  if (num !== null && (isNaN(num) || num < 0)) { el.value=''; return; }
  g.score[tSlot] = num;

  if (isScoreWinner(rKey, gk)) {
    const w = getWinner(rKey, gk);
    if (g.pick && g.pick !== w) clearDownstream(rKey, gk);
    g.pick = w;
    propagate(rKey, gk);
  } else if (g.score[0] === null && g.score[1] === null) {
    clearDownstream(rKey, gk);
    if (g.pick) propagate(rKey, gk);
  }
  renderGame(rKey, gk);
  updateAccuracy();
  saveState();
}

function innInput(el, rKey, gk) {
  const num = el.value.trim() === '' ? null : parseInt(el.value, 10);
  STATE[rKey][gk].innings = (num && num >= 1) ? num : null;
}

// ─── ELIMINATED CLICK ────────────────────────────────────────────────────────
function clickElim(rKey, teamKey) {
  if (!TEAMS[teamKey]) return;
  const team = TEAMS[teamKey];
  const reg = REGIONALS.find(r=>r.key===rKey);
  const rs = STATE[rKey];

  document.getElementById('m-name').textContent = team.name;
  document.getElementById('m-sub').textContent = `${team.record} · ${reg.name}`;

  const labels = {g1:'G1 WB',g2:'G2 WB',g3:'G3 WB',g4:'G4 LB',g5:'G5 LB',g6:'G6 Championship',g7:'G7 If Nec'};
  let wins=0, losses=0, items=[];

  ['g1','g2','g3','g4','g5','g6','g7'].forEach(gk => {
    const g = rs[gk];
    if (!g || (g.t0!==teamKey && g.t1!==teamKey)) return;
    if (!isScoreWinner(rKey, gk)) return;
    const self = g.t0===teamKey ? 0 : 1;
    const opp = 1-self;
    const oppTeam = TEAMS[g.t0===teamKey?g.t1:g.t0] || {name:g.t0===teamKey?g.t1:g.t0};
    const won = g.score[self] > g.score[opp];
    if (won) wins++; else losses++;
    const inn = g.innings ? ` (${g.innings})` : '';
    items.push(`<li><span>${labels[gk]} vs ${oppTeam.name}</span>
      <span><span class="wl-${won?'W':'L'}">${won?'W':'L'}</span> ${g.score[self]}–${g.score[opp]}${inn}</span></li>`);
  });

  document.getElementById('m-games').innerHTML = items.join('') || '<li style="color:var(--mu)">No completed games recorded</li>';
  document.getElementById('m-rec').innerHTML = `${wins}–${losses} <span>Tournament Record</span>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// ─── MODE ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  document.body.className='mode-'+m;
  ['picks','locked','results'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',x===m);
  });
  updateAccuracy();
}

// ─── ACCURACY (denominator = ALL picks made) ─────────────────────────────────
function updateAccuracy() {
  let correct=0, total=0;
  REGIONALS.forEach(reg=>{
    const rs = STATE[reg.key];
    ['g1','g2','g3','g4','g5','g6','g7'].forEach(gk=>{
      const g = rs[gk];
      if (!g || !g.pick) return;
      total++;
      if (isScoreWinner(reg.key,gk) && g.pick===getWinner(reg.key,gk)) correct++;
    });
  });
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('acc-text').textContent =
    total > 0 ? `${correct} / ${total} (${pct}%)` : '0 / 0';
}

// ─── RESET ALL ────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all picks and scores?')) return;
  REGIONALS.forEach(reg=>{
    initState(reg.key);
    ['g1','g2','g3','g4','g5','g6','g7'].forEach(gk=>renderGame(reg.key, gk));
    updatePodChamp(reg.key);
  });
  updateAccuracy();
  saveState();
}

// ─── GAME POSITIONS ───────────────────────────────────────────────────────────
// Card: width=147px, label=14px, row×2=26px each → height=66px
// Pod body height: 258px
const GPOS = {
  g1: [6,   8],   // WB: Seed1 v Seed4
  g2: [6,   110], // WB: Seed2 v Seed3
  g3: [165, 55],  // WB: W1 v W2
  g4: [165, 178], // LB: L1 v L2
  g5: [324, 130], // LB: L3 v W4
  g6: [462, 22],  // Championship: W3 v W5
  g7: [462, 148], // If Nec
};

// ─── MAKE TEAM ROW ────────────────────────────────────────────────────────────
function makeTeamRow(rKey, gk, tSlot, team, g, isChamp) {
  if (!team) {
    return `<div class="gc-team tbd"><span class="gc-seed"></span><span class="gc-name">TBD</span></div>`;
  }
  const info = TEAMS[team] || { name:team, seed:'?' };
  const hasScore = isScoreWinner(rKey, gk);
  const winner = getWinner(rKey, gk);
  const loser = getLoser(rKey, gk);
  const isPicked = g.pick === team && !hasScore;
  const isWinner = hasScore && winner === team;
  const isLoser = hasScore && loser === team;
  const isElim = isLoser && (gk !== 'g6' && gk !== 'g7');

  let cls='gc-team';
  if (isPicked) cls+=' picked';
  if (isWinner) cls+=' winner';
  if (isLoser) cls+=' loser';

  const sc = g.score[tSlot];
  const champFlag = (isChamp && STATE[rKey].champ===team) ? '<span class="gc-champ-flag">CHAMP</span>' : '';
  const logoSrc = logoUrl(team);
  const logoHtml = logoSrc
    ? `<img class="gc-logo" src="${logoSrc}" onerror="this.style.display='none'" alt="">`
    : '';
  const clickFn = isElim ? `clickElim('${rKey}','${team}')` : `pickTeam('${rKey}','${gk}',${tSlot})`;

  return `<div class="${cls}" onclick="${clickFn}">
    <span class="gc-seed">${info.seed||''}</span>
    ${logoHtml}
    <span class="gc-name">${info.name}${champFlag}</span>
    <span class="gc-score">${sc!==null?sc:''}</span>
    <input class="gc-run" type="number" min="0" value="${sc!==null?sc:''}"
      oninput="scoreInput(this,'${rKey}','${gk}',${tSlot})"
      onclick="event.stopPropagation()" placeholder="R">
  </div>`;
}

// ─── RENDER GAME ──────────────────────────────────────────────────────────────
const GAME_LABELS = {
  g1:'G1 <span class="wb">WB</span>',
  g2:'G2 <span class="wb">WB</span>',
  g3:'G3 <span class="wb">WB Semi</span>',
  g4:'G4 <span class="lb">LB</span>',
  g5:'G5 <span class="lb">LB Semi</span>',
  g6:'G6 <span class="champ">Champ</span>',
  g7:'G7 <span class="ifnec">If Nec</span>',
};

function renderGame(rKey, gk) {
  const el = document.getElementById(`gc-${rKey}-${gk}`);
  if (!el) return;
  const g = STATE[rKey][gk];
  const [cx, cy] = GPOS[gk];
  const isChamp = gk==='g6'||gk==='g7';
  const inactive = gk==='g7' && !g.active && !g.t0;
  const opacity = inactive ? 'opacity:.32;pointer-events:none' : '';
  const inn = g.innings ? ` · ${g.innings} inn` : '';
  const schedStr = (SCHEDULES[rKey] && SCHEDULES[rKey][gk]) ? SCHEDULES[rKey][gk] + inn : inn.slice(3);
  const schedHtml = schedStr ? `<span class="gc-time">${schedStr}</span>` : '';

  el.innerHTML = `
    <div class="gc-lbl" style="display:flex;justify-content:space-between;align-items:center"><span>${GAME_LABELS[gk]}</span>${schedHtml}</div>
    ${makeTeamRow(rKey,gk,0,g.t0,g,isChamp)}
    ${makeTeamRow(rKey,gk,1,g.t1,g,isChamp)}
    <div class="gc-inn"><label>INN</label><input type="number" min="1" max="15" value="${g.innings||''}"
      oninput="innInput(this,'${rKey}','${gk}')" onclick="event.stopPropagation()"></div>
  `;
  el.style.cssText = `left:${cx}px;top:${cy}px;${opacity}`;
}

// ─── DRAW CONNECTORS ─────────────────────────────────────────────────────────
// Card geometry: label=14px, row height=26px, team0 center=14+13=27, team1 center=14+26+13=53
// Card right edges: g1/g2 = 6+147=153, g3/g4 = 165+147=312, g5 = 324+147=471, g6/g7 = 462+147=609
// Absolute y-centers:
//   g1 row0=8+27=35, row1=8+53=61; g2 row0=110+27=137, row1=110+53=163
//   g3 row0=55+27=82, row1=55+53=108; g4 row0=178+27=205, row1=178+53=231
//   g5 row0=130+27=157, row1=130+53=183
//   g6 row0=22+27=49, row1=22+53=75; g7 row0=148+27=175, row1=148+53=201
function drawConnectors(rKey) {
  const svgEl = document.getElementById(`svg-${rKey}`);
  if (!svgEl) return;
  const paths = [
    // G1 winner(row0=35) → G3 slot0(row0=82)
    ['M153,35 C159,35 159,82 165,82','wb'],
    // G2 winner(row0=137) → G3 slot1(row1=108)  [goes UP]
    ['M153,137 C159,137 159,108 165,108','wb'],
    // G1 loser(row1=61) → G4 slot0(row0=205)
    ['M153,61 C159,61 159,205 165,205','lb'],
    // G2 loser(row1=163) → G4 slot1(row1=231)
    ['M153,163 C159,163 159,231 165,231','lb'],
    // G3 winner(row0=82) → G6 slot0(row0=49)  [longer run, goes UP]
    ['M312,82 C387,82 387,49 462,49','wb'],
    // G3 loser(row1=108) → G5 slot0(row0=157)
    ['M312,108 C318,108 318,157 324,157','lb'],
    // G4 winner(row0=205) → G5 slot1(row1=183)  [goes UP]
    ['M312,205 C318,205 318,183 324,183','lb'],
    // G5 winner(row0=157) → G6 slot1(row1=75)  [goes LEFT+UP]
    ['M471,157 C475,157 475,75 462,75','champ'],
  ];
  svgEl.innerHTML = paths.map(([d,type])=>`<path d="${d}" class="conn-${type}"/>`).join('');
}

// ─── RENDER POD ───────────────────────────────────────────────────────────────
function renderPod(reg) {
  const champ = STATE[reg.key].champ;
  const champName = champ && TEAMS[champ] ? TEAMS[champ].name : '';
  return `
    <div class="pod" id="pod-${reg.key}">
      <div class="pod-hdr">
        <span class="pod-name">${reg.name}
          <span class="pod-champ" id="pod-champ-${reg.key}" style="display:${champName?'inline-flex':'none'}">${champName}</span>
        </span>
        <span class="pod-date">${reg.date}</span>
      </div>
      <div class="pod-body">
        <svg class="pod-svg" id="svg-${reg.key}" viewBox="0 0 620 258" xmlns="http://www.w3.org/2000/svg"></svg>
        ${Object.keys(GPOS).map(gk=>
          `<div class="gc" id="gc-${reg.key}-${gk}" style="left:${GPOS[gk][0]}px;top:${GPOS[gk][1]}px"></div>`
        ).join('')}
      </div>
    </div>`;
}

// ─── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll() {
  const main = document.getElementById('main');
  let html = '<div class="pods-grid">';
  REGIONALS.forEach((reg,i) => {
    if (i > 0 && i % 2 === 0) html += '</div><div class="pods-grid">';
    html += renderPod(reg);
  });
  html += '</div>';
  main.innerHTML = html;
  REGIONALS.forEach(reg => {
    ['g1','g2','g3','g4','g5','g6','g7'].forEach(gk => renderGame(reg.key, gk));
    drawConnectors(reg.key);
    updatePodChamp(reg.key);
  });
  updateAccuracy();
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem('bracket2026_regionals', JSON.stringify(STATE)); } catch(e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('bracket2026_regionals');
    if (!saved) return;
    const p = JSON.parse(saved);
    REGIONALS.forEach(reg => {
      if (p[reg.key]) Object.assign(STATE[reg.key], p[reg.key]);
    });
  } catch(e) {}
}

// ─── ESPN LIVE SYNC ──────────────────────────────────────────────────────────

function resolveTeamKey(...candidates) {
  for (const name of candidates) {
    if (!name) continue;
    const lower = name.toLowerCase().trim();
    if (ESPN_NAME_MAP[lower]) return ESPN_NAME_MAP[lower];
    // Partial match fallback
    for (const [k, v] of Object.entries(ESPN_NAME_MAP)) {
      if (lower.includes(k) || k.includes(lower)) return v;
    }
  }
  return null;
}

function shouldPoll() {
  // Approximate ET (UTC-4 in May)
  const et = new Date(Date.now() - 4 * 3600000);
  const dateStr = et.toISOString().slice(0, 10);
  const hour = et.getUTCHours();
  return GAME_DAYS.has(dateStr) && hour >= 10 && hour < 24;
}

// Programmatically apply a final score (used by ESPN sync)
function applyScore(rKey, gk, s0, s1, inn) {
  const g = STATE[rKey][gk];
  if (!g || !g.t0 || !g.t1) return false;
  if (s0 === s1) return false; // no ties in softball
  if (g.score[0] === s0 && g.score[1] === s1) return false; // already applied, skip
  g.score = [s0, s1];
  if (inn != null) g.innings = inn;
  if (isScoreWinner(rKey, gk)) {
    const w = getWinner(rKey, gk);
    if (g.pick && g.pick !== w) clearDownstream(rKey, gk);
    g.pick = w;
    propagate(rKey, gk);
  }
  renderGame(rKey, gk);
  updateAccuracy();
  return true;
}

async function fetchESPNScores() {
  updateSyncUI('syncing');
  try {
    // Fetch today's NCAA softball scoreboard
    const et = new Date(Date.now() - 4 * 3600000);
    const dateParam = et.toISOString().slice(0, 10).replace(/-/g, '');
    const url = `https://site.api.espn.com/apis/site/v2/sports/softball/college-softball/scoreboard?dates=${dateParam}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    let applied = 0;
    const pending = []; // collect ESPN games to match

    (data.events || []).forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const status = comp.status?.type;
      if (!status?.completed) return; // only final games
      const [c1, c2] = comp.competitors || [];
      if (!c1 || !c2) return;
      const k1 = resolveTeamKey(c1.team?.displayName, c1.team?.shortDisplayName, c1.team?.abbreviation);
      const k2 = resolveTeamKey(c2.team?.displayName, c2.team?.shortDisplayName, c2.team?.abbreviation);
      if (!k1 || !k2) return;
      const s1 = parseInt(c1.score, 10);
      const s2 = parseInt(c2.score, 10);
      if (isNaN(s1) || isNaN(s2)) return;
      pending.push({ k1, k2, s1, s2 });
    });

    // Multi-pass match: first pass populates g1/g2, subsequent passes can reach g3+
    for (let pass = 0; pass < 4; pass++) {
      pending.forEach(({ k1, k2, s1, s2 }) => {
        REGIONALS.forEach(reg => {
          ['g1','g2','g3','g4','g5','g6','g7'].forEach(gk => {
            const g = STATE[reg.key][gk];
            if (!g) return;
            const m1 = g.t0 === k1 && g.t1 === k2;
            const m2 = g.t0 === k2 && g.t1 === k1;
            if (!m1 && !m2) return;
            if (applyScore(reg.key, gk, m1 ? s1 : s2, m1 ? s2 : s1, null)) applied++;
          });
        });
      });
    }

    if (applied > 0) saveState();
    const ts = new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    localStorage.setItem('espn_last_sync', JSON.stringify({ ts, day: et.toISOString().slice(0,10) }));
    updateSyncUI('ok', ts, applied);
  } catch(e) {
    console.warn('[ESPN sync failed]', e);
    updateSyncUI('error');
  }
}

function updateSyncUI(state, ts='', count=0) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if (!dot || !text) return;
  dot.className = 'sync-dot';
  if (state === 'syncing') {
    dot.classList.add('syncing');
    text.textContent = 'Syncing…';
  } else if (state === 'ok') {
    if (shouldPoll()) dot.classList.add('live');
    text.innerHTML = ts
      ? `Synced ${ts}${count > 0 ? ` · <span class="sync-new">+${count}</span>` : ''}`
      : (shouldPoll() ? 'Live · no scores yet' : 'May 15–17');
  } else if (state === 'error') {
    dot.classList.add('err');
    text.textContent = 'Sync failed · retry ↻';
  }
}

function manualSync() { fetchESPNScores(); }

// ─── POLLING SCHEDULE ─────────────────────────────────────────────────────────
// Hourly check — only fires a fetch when it's actually a game day/window
setInterval(() => {
  if (shouldPoll()) fetchESPNScores();
}, 60 * 60 * 1000); // 1 hour

// ─── INIT ─────────────────────────────────────────────────────────────────────
REGIONALS.forEach(reg => initState(reg.key));
loadState();
renderAll();

// Restore sync badge from last session
try {
  const cached = JSON.parse(localStorage.getItem('espn_last_sync') || 'null');
  if (cached?.ts) updateSyncUI('ok', cached.ts, 0);
  else if (shouldPoll()) updateSyncUI('ok', '', 0);
} catch(e) {}

// Auto-fetch on page load if it's game day
if (shouldPoll()) setTimeout(fetchESPNScores, 1200);
